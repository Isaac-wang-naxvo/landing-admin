<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Kit 後台</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { font-family: -apple-system, 'DM Sans', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }
    a { text-decoration: none; }

    /* ── Variables ── */
    :root {
      --bg:      #0a0a0a;
      --bg2:     #111;
      --bg3:     #1a1a1a;
      --border:  rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.14);
      --text:    #e0e0e0;
      --text2:   #888;
      --text3:   #444;
      --accent:  #d4ff47;
      --red:     #ef4444;
      --green:   #22c55e;
      --radius:  10px;
    }

    /* ── Login screen ── */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 360px;
      text-align: center;
    }
    .login-logo { font-size: 32px; margin-bottom: 8px; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 12px 14px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; color: var(--text); outline: none; margin-bottom: 10px;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--border2); }
    .login-btn {
      width: 100%; padding: 12px; background: var(--accent); color: #0a0a0a;
      font-size: 14px; font-weight: 700; border: none; border-radius: var(--radius);
      transition: opacity .2s;
    }
    .login-btn:hover { opacity: .85; }
    .login-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

    /* ── App shell ── */
    .app { display: none; }
    .app.visible { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 12px;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-logo { font-size: 13px; font-weight: 700; color: var(--accent); padding: 6px 10px; margin-bottom: 20px; letter-spacing: .05em; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 8px; font-size: 13px;
      color: var(--text2); cursor: pointer; transition: all .15s; border: none;
      background: transparent; width: 100%; text-align: left; margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: var(--bg3); color: var(--text); font-weight: 600; }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .logout-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px; font-size: 12px;
      color: var(--text3); cursor: pointer; border: none; background: transparent;
      width: 100%; transition: color .15s;
    }
    .logout-btn:hover { color: var(--red); }

    /* ── Main content ── */
    .main { flex: 1; overflow-y: auto; }
    .page { display: none; padding: 28px 32px; max-width: 900px; }
    .page.active { display: block; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .page-sub    { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
    }
    .stat-val  { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-label{ font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }

    /* ── Product list ── */
    .product-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .product-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      display: flex; align-items: center; gap: 16px;
      transition: border-color .15s;
    }
    .product-card:hover { border-color: var(--border2); }
    .product-badge {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 11px;
      font-weight: 700; color: var(--accent); letter-spacing: .04em;
      white-space: nowrap;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .product-meta { font-size: 12px; color: var(--text2); }
    .product-slot { font-size: 12px; color: var(--text2); white-space: nowrap; margin-right: 8px; }
    .slot-pct { display: inline-block; width: 60px; height: 4px; background: var(--bg3); border-radius: 100px; vertical-align: middle; margin: 0 6px; }
    .slot-fill { height: 100%; background: var(--accent); border-radius: 100px; }
    .product-actions { display: flex; gap: 6px; }
    .btn-sm {
      padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: transparent; color: var(--text2);
      transition: all .15s; cursor: pointer;
    }
    .btn-sm:hover { border-color: var(--border2); color: var(--text); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-primary {
      padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 700;
      background: var(--accent); color: #0a0a0a; border: none;
      transition: opacity .15s; cursor: pointer;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
      background: transparent; color: var(--text2);
      border: 1px solid var(--border); transition: all .15s; cursor: pointer;
    }
    .btn-secondary:hover { border-color: var(--border2); color: var(--text); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 100%; max-width: 580px;
      position: relative;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: transparent; border: none; color: var(--text2);
      font-size: 20px; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    /* ── Form fields ── */
    .field-group { margin-bottom: 14px; }
    .field-label { font-size: 11.5px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; display: block; }
    .field-input, .field-select, .field-textarea {
      width: 100%; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; color: var(--text); outline: none;
      transition: border-color .2s;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--border2); }
    .field-textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
    .field-select { appearance: none; cursor: pointer; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

    .pain-row { display: grid; grid-template-columns: 44px 1fr 2fr; gap: 8px; margin-bottom: 8px; align-items: center; }
    .pain-row input { padding: 8px 10px; }

    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text3); margin: 20px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

    /* ── Leads table ── */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-head { display: grid; grid-template-columns: 1fr 100px 120px 100px 140px; gap: 0; background: var(--bg3); border-bottom: 1px solid var(--border); }
    .th { padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
    .table-row { display: grid; grid-template-columns: 1fr 100px 120px 100px 140px; border-bottom: 1px solid var(--border); transition: background .12s; }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--bg3); }
    .td { padding: 11px 14px; font-size: 12.5px; color: var(--text2); display: flex; align-items: center; overflow: hidden; }
    .td.contact { color: var(--text); font-weight: 500; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 10.5px; font-weight: 700;
    }
    .badge-wait { background: rgba(239,68,68,.12); color: #ef4444; }
    .badge-lead { background: rgba(34,197,94,.12); color: #22c55e; }
    .badge-param { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 13px; }
    .empty-icon  { font-size: 36px; margin-bottom: 10px; }

    /* ── URL preview ── */
    .url-preview {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; font-size: 12px;
      color: var(--accent); font-family: monospace; margin-top: 6px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .url-copy { font-size: 11px; color: var(--text2); cursor: pointer; border: 1px solid var(--border); background: transparent; padding: 3px 10px; border-radius: 6px; }
    .url-copy:hover { color: var(--text); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 100px;
      opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .page { padding: 20px 16px; }
      .field-row { grid-template-columns: 1fr; }
      .table-head, .table-row { grid-template-columns: 1fr 80px 100px; }
      .th:nth-child(4), .th:nth-child(5), .td:nth-child(4), .td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════════════ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">🚀</div>
    <div class="login-title">Landing Kit 後台</div>

</div>

<!-- ════════════════════════════════════════

     ════════════════════════════════════════ -->

  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'rgba(239,68,68,.3)' : 'rgba(255,255,255,.08)';
  t.style.color = isError ? '#ef4444' : '#e0e0e0';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Login ─────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('lk_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
function doLogout() {
  sessionStorage.removeItem('lk_auth');
  location.reload();
}
if (sessionStorage.getItem('lk_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}

// ── Navigation ────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'leads') renderLeads();
}

// ── Load all data ─────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadConfigs(), loadLeads()]);
  renderDashboard();
  renderProducts();
}

async function loadConfigs() {
  const { data, error } = await sb.from('landing_configs').select('*').order('created_at', { ascending: false });
  if (error) { toast('載入產品失敗', true); return; }
  allConfigs = data || [];
}

async function loadLeads() {
  const { data, error } = await sb.from('leads').select('*').order('created_at', { ascending: false });
  if (error) { toast('載入名單失敗', true); return; }
  allLeads = data || [];
}

// ── Dashboard ─────────────────────────────────────────────
async function renderDashboard() {
  const { data: views } = await sb.from('page_views').select('param_key');
  const viewMap = {};
  (views || []).forEach(v => { viewMap[v.param_key] = (viewMap[v.param_key] || 0) + 1; });

  const totalViews = Object.values(viewMap).reduce((a,b) => a+b, 0);
  const totalLeads = allLeads.filter(l => !l.is_waitlist).length;
  const totalWait  = allLeads.filter(l => l.is_waitlist).length;
  const overallRate = totalViews > 0 ? ((totalLeads / totalViews) * 100).toFixed(1) : '0.0';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-val">${totalViews}</div><div class="stat-label">總曝光次數</div></div>
    <div class="stat-card"><div class="stat-val">${totalLeads}</div><div class="stat-label">有效預約</div></div>
    <div class="stat-card"><div class="stat-val">${totalWait}</div><div class="stat-label">候補名單</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${overallRate}%</div><div class="stat-label">整體轉換率</div></div>
  `;

  const allKeys = [...new Set([...allConfigs.map(c => c.param_key), ...Object.keys(viewMap)])];
  if (allKeys.length === 0) {
    document.getElementById('dashboard-breakdown').innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div>還沒有任何市場數據</div>`;
    return;
  }

  let rows = allKeys.map(key => {
    const cfg    = allConfigs.find(c => c.param_key === key);
    const v      = viewMap[key] || 0;
    const leads  = allLeads.filter(l => l.param_key === key && !l.is_waitlist).length;
    const wait   = allLeads.filter(l => l.param_key === key && l.is_waitlist).length;
    const rate   = v > 0 ? ((leads / v) * 100).toFixed(1) : '0.0';
    const name   = cfg?.headline?.split('\n')[0] || key;
    return { key, name, v, leads, wait, rate: parseFloat(rate) };
  }).sort((a,b) => b.rate - a.rate);

  document.getElementById('dashboard-breakdown').innerHTML = `
    <div style="font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">各市場分析</div>
    <div class="table-wrap">
      <div style="display:grid;grid-template-columns:1fr 80px 80px 80px 90px;background:var(--bg3);border-bottom:1px solid var(--border);">
        <div class="th">市場</div><div class="th">曝光</div><div class="th">預約</div><div class="th">候補</div><div class="th">轉換率</div>
      </div>
      ${rows.map(r => `
        <div style="display:grid;grid-template-columns:1fr 80px 80px 80px 90px;border-bottom:1px solid var(--border);">
          <div class="td" style="flex-direction:column;align-items:flex-start;gap:2px;">
            <span style="color:var(--text);font-weight:500;">${r.name}</span>
            <span class="badge badge-param">?p=${r.key}</span>
          </div>
          <div class="td">${r.v}</div>
          <div class="td" style="color:#22c55e;font-weight:600;">${r.leads}</div>
          <div class="td">${r.wait}</div>
          <div class="td" style="color:${r.rate>=8?'#22c55e':r.rate>=3?'#f59e0b':'#ef4444'};font-weight:700;">${r.rate}%</div>
        </div>`).join('')}
    </div>`;
}

// ── Products ──────────────────────────────────────────────
function renderProducts() {
  const list = document.getElementById('product-list');
  if (allConfigs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🗂</div>還沒有產品，點上方按鈕新增</div>`;
    return;
  }
  list.innerHTML = allConfigs.map(c => {
    const remaining = (c.slots_total || 30) - (c.slots_taken || 0);
    const pct = Math.min(100, Math.round(((c.slots_taken||0) / (c.slots_total||30)) * 100));
    const leads = allLeads.filter(l => l.param_key === c.param_key && !l.is_waitlist).length;
    return `
      <div class="product-card">
        <div class="product-badge">?p=${c.param_key}</div>
        <div class="product-info">
          <div class="product-name">${c.headline?.split('\n')[0] || '未命名產品'}</div>
          <div class="product-meta">${c.theme} · 預約 ${leads} 筆</div>
        </div>
        <div class="product-slot">
          <span>${c.slots_taken||0}/${c.slots_total||30}</span>
          <span class="slot-pct"><span class="slot-fill" style="width:${pct}%"></span></span>
          剩 ${remaining}
        </div>
        <div class="product-actions">
          <button class="btn-sm" onclick="copyFrontendUrl('${c.param_key}')">🔗</button>
          <button class="btn-sm" onclick="editProduct('${c.id}')">編輯</button>
          <button class="btn-sm danger" onclick="deleteProduct('${c.id}')">刪除</button>
        </div>
      </div>`;
  }).join('');
}

// ── Leads ─────────────────────────────────────────────────
function renderLeads() {
  const filterKey  = document.getElementById('leads-filter').value;
  const filterType = document.getElementById('leads-type').value;

  // update filter options
  const sel = document.getElementById('leads-filter');
  const keys = [...new Set(allLeads.map(l => l.param_key).filter(Boolean))];
  const current = sel.value;
  sel.innerHTML = '<option value="">全部市場</option>' +
    keys.map(k => `<option value="${k}" ${k===current?'selected':''}>${k}</option>`).join('');

  let filtered = allLeads;
  if (filterKey)  filtered = filtered.filter(l => l.param_key === filterKey);
  if (filterType !== '') filtered = filtered.filter(l => String(l.is_waitlist) === filterType);

  const body = document.getElementById('leads-table-body');
  if (filtered.length === 0) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>還沒有名單資料</div>`;
    return;
  }
  body.innerHTML = filtered.map(l => {
    const date = new Date(l.created_at).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `
      <div class="table-row">
        <div class="td contact">${l.contact}</div>
        <div class="td"><span class="badge badge-param">${l.param_key || '—'}</span></div>
        <div class="td"><span class="badge ${l.is_waitlist ? 'badge-wait' : 'badge-lead'}">${l.is_waitlist ? '候補' : '預約'}</span></div>
        <div class="td">${l.utm_source || '—'}</div>
        <div class="td">${date}</div>
      </div>`;
  }).join('');
}

// ── Modal helpers ─────────────────────────────────────────
function openModal(cfg = null) {
  editingId = cfg ? cfg.id : null;
  document.getElementById('modal-title').textContent = cfg ? '編輯產品' : '新增產品';

  // reset
  ['f-param','f-badge','f-headline','f-subtext','f-cta','f-social'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-theme').value = 'dark-minimal';
  document.getElementById('f-total').value = 30;
  document.getElementById('f-taken').value = 0;
  for (let i=0;i<3;i++) {
    document.getElementById(`p${i}-icon`).value = ['😤','💸','🔄'][i];
    document.getElementById(`p${i}-title`).value = '';
    document.getElementById(`p${i}-desc`).value = '';
    document.getElementById(`f${i}-icon`).value = ['⚡','🧩','🛡️'][i];
    document.getElementById(`f${i}-title`).value = '';
    document.getElementById(`f${i}-desc`).value = '';
  }

  if (cfg) {
    document.getElementById('f-param').value    = cfg.param_key || '';
    document.getElementById('f-theme').value    = cfg.theme || 'dark-minimal';
    document.getElementById('f-badge').value    = cfg.badge || '';
    document.getElementById('f-headline').value = cfg.headline || '';
    document.getElementById('f-subtext').value  = cfg.subtext || '';
    document.getElementById('f-cta').value      = cfg.cta_text || '';
    document.getElementById('f-social').value   = cfg.social_proof || '';
    document.getElementById('f-total').value    = cfg.slots_total || 30;
    document.getElementById('f-taken').value    = cfg.slots_taken || 0;
    const pains = cfg.pains || [];
    pains.forEach((p, i) => {
      if (i > 2) return;
      document.getElementById(`p${i}-icon`).value  = p.icon || '';
      document.getElementById(`p${i}-title`).value = p.title || '';
      document.getElementById(`p${i}-desc`).value  = p.desc || '';
    });
    const feats = cfg.features || [];
    feats.forEach((f, i) => {
      if (i > 2) return;
      document.getElementById(`f${i}-icon`).value  = f.icon || '';
      document.getElementById(`f${i}-title`).value = f.title || '';
      document.getElementById(`f${i}-desc`).value  = f.desc || '';
    });
  }
  updateUrlPreview();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function updateUrlPreview() {
  const param = document.getElementById('f-param').value.trim();
  const url = param ? `${FRONTEND_BASE}?p=${param}` : '填入網址參數後顯示';
  document.getElementById('url-text').textContent = url;
}

function copyUrl() {
  const param = document.getElementById('f-param').value.trim();
  if (!param) return;
  navigator.clipboard.writeText(`${FRONTEND_BASE}?p=${param}`).then(() => toast('連結已複製！'));
}

function copyFrontendUrl(param) {
  navigator.clipboard.writeText(`${FRONTEND_BASE}?p=${param}`).then(() => toast('連結已複製！'));
}

// ── Save product ──────────────────────────────────────────
async function saveProduct() {
  const param = document.getElementById('f-param').value.trim();
  if (!param) { toast('請填入網址參數', true); return; }

  const pains = [0,1,2].map(i => ({
    icon:  document.getElementById(`p${i}-icon`).value,
    title: document.getElementById(`p${i}-title`).value,
    desc:  document.getElementById(`p${i}-desc`).value,
  })).filter(p => p.title);

  const features = [0,1,2].map(i => ({
    icon:  document.getElementById(`f${i}-icon`).value,
    title: document.getElementById(`f${i}-title`).value,
    desc:  document.getElementById(`f${i}-desc`).value,
  })).filter(f => f.title);

  const payload = {
    param_key:    param,
    theme:        document.getElementById('f-theme').value,
    badge:        document.getElementById('f-badge').value,
    headline:     document.getElementById('f-headline').value,
    subtext:      document.getElementById('f-subtext').value,
    cta_text:     document.getElementById('f-cta').value,
    social_proof: document.getElementById('f-social').value,
    slots_total:  parseInt(document.getElementById('f-total').value) || 30,
    slots_taken:  parseInt(document.getElementById('f-taken').value) || 0,
    pains:        pains,
    features:     features,
    is_active:    true,
  };

  const btn = document.getElementById('save-btn');
  btn.textContent = '儲存中...';
  btn.disabled = true;

  let error;
  if (editingId) {
    ({ error } = await sb.from('landing_configs').update(payload).eq('id', editingId));
  } else {
    ({ error } = await sb.from('landing_configs').insert(payload));
  }

  btn.textContent = '儲存產品';
  btn.disabled = false;

  if (error) { toast('儲存失敗：' + error.message, true); return; }

  toast(editingId ? '✅ 產品已更新！' : '✅ 產品已新增！');
  closeModal();
  await loadConfigs();
  renderProducts();
  renderDashboard();
}

// ── Edit product ──────────────────────────────────────────
function editProduct(id) {
  const cfg = allConfigs.find(c => c.id === id);
  if (cfg) openModal(cfg);
}

// ── Delete product ────────────────────────────────────────
async function deleteProduct(id) {
  if (!confirm('確定要刪除這個產品設定？')) return;
  const { error } = await sb.from('landing_configs').delete().eq('id', id);
  if (error) { toast('刪除失敗', true); return; }
  toast('已刪除');
  await loadConfigs();
  renderProducts();
}

// ── Auto init ─────────────────────────────────────────────
if (sessionStorage.getItem('lk_auth') === '1') loadAll();
</script>
